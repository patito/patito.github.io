<div class="sidebar">
  <div class="container sidebar-sticky">

    <div class="term-titlebar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="term-path">~/patito — zsh</span>
    </div>

    <div class="sidebar-about">
      <a class="sidebar-brand" href="{{ site.baseurl }}">
        <img class="profile-picture" src="{{ site.baseurl }}public/225e531.jpg" alt="{{ site.author.name }}" />
        <h1 class="site-name"><span class="prompt">~/</span>{{ site.title }}<span class="cursor"></span></h1>
      </a>
      <p class="lead">{{ site.description }}</p>
    </div>

    <nav class="sidebar-nav">
      <a class="sidebar-nav-item{% if page.url == site.baseurl %} active{% endif %}" href="{{ site.baseurl }}" title="Home"><i class="fa fa-home"></i></a>

      {% assign pages_list = site.pages %}
      {% for node in pages_list %}
        {% if node.title != null %}
          {% if node.layout == "page" %}
            <a class="sidebar-nav-item{% if page.url == node.url %} active{% endif %}" href="{{ node.url }}">{{ node.title }}</a>
          {% endif %}
        {% endif %}
      {% endfor %}

      <a class="sidebar-nav-item" href="mailto:benatto@gmail.com" title="E-mail"><i class="fa fa-envelope"></i></a>
      <a class="sidebar-nav-item" href="https://twitter.com/pbenatto" title="Twitter"><i class="fa fa-twitter"></i></a>
      <a class="sidebar-nav-item" href="https://github.com/patito" title="GitHub"><i class="fa fa-github"></i></a>
      <a class="sidebar-nav-item" href="/atom.xml" title="RSS"><i class="fa fa-feed"></i></a>
    </nav>
  </div>
</div>
